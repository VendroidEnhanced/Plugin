name: Build DevBuild
on:
    workflow_dispatch:
    push:
        branches:
            - main
    schedule:
        - cron: "*/60 * * * *"
env:
    FORCE_COLOR: true
    GH_TOKEN: ${{ github.token }}

jobs:
    Build:
        runs-on: ubuntu-latest

        steps:
            - name: Clone plugin
              run: git clone https://github.com/VendroidEnhanced/plugin .
            
            - name: Clone Vencord
              run: git clone https://github.com/Vendicated/Vencord working

            - uses: pnpm/action-setup@v3

            - name: Apply patches from common
              run: |
                for patch in $(find ./common -name "*.patch"); do
                  git apply $patch
                done

            - name: Apply common files # i love ai
              run: |
                for file in $(find ./common -type f); do
                  relative_path=$(echo $file | sed 's|./common/||')
                  target_path="./working/$relative_path"
                  target_dir=$(dirname $target_path)
                  mkdir -p $target_dir
                  cp $file $target_path
                done

            - name: ls
              run: ls src/components/VencordSettings

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWeb --standalone

            - name: Clean up obsolete files
              run: |
                  rm -rf dist/*-unpacked dist/monaco Vencord.user.css vencordDesktopRenderer.css vencordDesktopRenderer.css.map
            - name: Get some values needed for the release
              id: release_values
              run: |
                  echo "release_tag=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

            - name: Switch default repo (i hate gh_
              run: |
                  git remote set-url origin https://github.com/VendroidEnhanced/plugin.git
                  gh repo set-default VendroidEnhanced/plugin
                  
            - name: Upload DevBuild as release
              run: |
                  gh release upload devbuild --clobber dist/* 
                  gh release edit devbuild --title "DevBuild $RELEASE_TAG"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_TAG: ${{ env.release_tag }}
